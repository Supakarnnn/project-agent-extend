services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      MILVUS_URI: http://milvus:19530
    ports:
      - "8000:8000"
    depends_on:
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./app/my-app
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  milvus:
    image: milvusdb/milvus:v2.4.17
    command: milvus run standalone
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  attu:
    image: zilliz/attu:v2.4.12
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8001:3000"
    depends_on:
      milvus:
        condition: service_healthy

  airflow:
    build:
      context: ./airflow
    command: ["bash", "-c", "rm -f /opt/airflow/airflow-webserver.pid && exec airflow standalone"]
    env_file:
      - ./backend/.env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MILVUS_URI: http://milvus:19530
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./backend:/opt/revive/backend:ro
      - airflow_data:/opt/airflow
    ports:
      - "8081:8080"
    depends_on:
      milvus:
        condition: service_healthy

volumes:
  milvus_data:
  airflow_data:
